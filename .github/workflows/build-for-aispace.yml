name: Build for AI SPACE

# main에 커밋이 올라오면 GitHub의 컴퓨터(7GB)가 대신 빌드하고,
# 완성품(.next)을 main에 자동 커밋합니다.
# AI SPACE 서버는 이 완성품을 받아 실행만 하므로 512MB로 충분해집니다.
on:
  push:
    branches: [main]

# 봇이 만든 커밋(.next 갱신)에는 다시 반응하지 않도록 이중 안전장치:
# 1) 커밋 메시지의 [skip ci]  2) 아래 actor 조건
jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 20 설치 (AI SPACE 런타임과 동일 버전)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: Next.js 프로덕션 빌드
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://qjffaltwnyoizvmubyxl.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_w4RtsgpH3GvHwCGJPastpA_Sax8Gzjp
          NEXT_PUBLIC_SITE_URL: https://topbustravel.com
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # 아래 둘은 빌드 통과용 임시값 — 실제 값은 서버 환경변수에서만 사용됨
          ADMIN_PASSWORD: build-only
          SESSION_SECRET: build-only
        run: npx next build

      - name: 빌드 캐시 제거 (저장소 용량 절약)
        run: |
          rm -rf .next/cache
          echo "prebuilt-by-github-actions $(date -u +%Y-%m-%dT%H:%M:%SZ)" > .next/PREBUILT

      - name: 완성품(.next)을 main에 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .next
          if git diff --cached --quiet; then
            echo "빌드 결과 변경 없음 — 커밋 생략"
          else
            git commit -m "[skip ci] build: prebuilt .next ($(git rev-parse --short HEAD))"
            git push
          fi
